name: Snyk ignore non-fixable vulns

on:
  schedule:
    # Daily at 07:00 UTC (uncomment and adjust as needed).
    # - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: snyk-ignore-non-fixable
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore progress CSV
        uses: actions/download-artifact@v4
        with:
          name: snyk-ignore-progress
        continue-on-error: true

      - name: Ignore non-fixable vulnerabilities
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_GROUP_ID: ${{ vars.SNYK_GROUP_ID }}
          # Uncomment for non-US tenants:
          # SNYK_API_BASE_URL: https://api.eu.snyk.io
        run: |
          set -euo pipefail
          STATE_CSV="ignore_non_fixable_progress.csv"
          if [ -f "$STATE_CSV" ]; then
            python ignore_non_fixable_vulns.py --resume -s "$STATE_CSV"
          else
            python ignore_non_fixable_vulns.py --group-id "$SNYK_GROUP_ID" -s "$STATE_CSV"
          fi

      - name: Save progress CSV
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-ignore-progress
          path: ignore_non_fixable_progress.csv
          retention-days: 90
          if-no-files-found: ignore
